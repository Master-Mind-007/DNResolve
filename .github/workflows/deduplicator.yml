name: Master Deduplicator

on:
  schedule:
    - cron: '0 6 * * 0' # Run automatically every Sunday morning
  workflow_dispatch: # Allow manual triggering button

jobs:
  merge-and-deduplicate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -U "huggingface_hub[cli]"

      - name: Orchestrate Month and Global Masters
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: |
          echo "Running massive cloud orchestration script..."
          python cloud_deduplicator.py
          echo "Done!"
